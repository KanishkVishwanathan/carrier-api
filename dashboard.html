<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chennai Logistics — Carrier Operations</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --amber: #f5a623;
    --amber-dim: rgba(245, 166, 35, 0.15);
    --amber-glow: rgba(245, 166, 35, 0.05);
    --green: #4caf79;
    --green-dim: rgba(76, 175, 121, 0.15);
    --red: #e05454;
    --red-dim: rgba(224, 84, 84, 0.15);
    --blue: #4a9eff;
    --blue-dim: rgba(74, 158, 255, 0.15);
    --text: #e8e8e8;
    --text-dim: #666666;
    --text-mid: #999999;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo-area {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .logo-tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--amber);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 1px;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .last-updated {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  /* Stats row */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent, var(--amber));
    opacity: 0.6;
  }

  .stat-card:hover {
    border-color: #333;
  }

  .stat-card.green { --accent: var(--green); }
  .stat-card.blue { --accent: var(--blue); }
  .stat-card.red { --accent: var(--red); }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }

  .stat-value span {
    font-size: 16px;
    color: var(--text-mid);
    font-weight: 400;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--text-mid);
  }

  /* Charts row */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
  }

  .chart-card.wide {
    grid-column: span 1;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--amber);
    background: var(--amber-dim);
    padding: 3px 8px;
    border-radius: 2px;
  }

  .chart-container {
    position: relative;
    height: 200px;
  }

  /* Calls table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 24px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 12px 12px 0;
    text-align: left;
    font-weight: 500;
  }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s;
  }

  tbody tr:hover {
    background: var(--surface2);
  }

  td {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    padding: 12px 12px 12px 0;
    vertical-align: middle;
  }

  td.carrier {
    color: var(--text);
    font-weight: 500;
  }

  td.rate {
    color: var(--amber);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .badge.deal_made, .badge.deal { background: var(--green-dim); color: var(--green); }
  .badge.no_deal { background: var(--red-dim); color: var(--red); }
  .badge.carrier_ineligible { background: rgba(100,100,100,0.2); color: #888; }
  .badge.carrier_declined { background: var(--red-dim); color: var(--red); }
  .badge.positive { background: var(--green-dim); color: var(--green); }
  .badge.neutral { background: var(--blue-dim); color: var(--blue); }
  .badge.negative { background: var(--red-dim); color: var(--red); }
  .badge.unknown { background: rgba(100,100,100,0.2); color: #888; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 12px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .footer-text a {
    color: var(--amber);
    text-decoration: none;
  }

  @media (max-width: 1000px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 16px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">LOADING OPERATIONS DATA</div>
</div>

<script>
const API_BASE = 'https://carrier-api-production-bde1.up.railway.app';
const API_KEY = 'chennai-logistics';

let outcomeChart, sentimentChart, rateChart;

async function fetchStats() {
  const res = await fetch(`${API_BASE}/call-stats`, {
    headers: { 'x-api-key': API_KEY }
  });
  return res.json();
}

function formatTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'Z');
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'Z');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function normOutcome(v) {
  if (!v) return 'unknown';
  return v.toLowerCase().replace(/\s+/g, '_');
}

function outcomeLabel(v) {
  const map = { deal_made: 'Deal Made', no_deal: 'No Deal', carrier_ineligible: 'Ineligible', carrier_declined: 'Declined', unknown: 'Unknown' };
  return map[normOutcome(v)] || v;
}

function render(data) {
  const convRate = data.conversion_rate || 0;
  const avgRate = data.avg_agreed_rate || 0;
  const total = data.total_calls || 0;
  const outcomes = data.outcomes || {};
  const sentiments = data.sentiments || {};
  const calls = data.recent_calls || [];

  // Normalize outcomes
  const normOutcomes = {};
  for (const [k, v] of Object.entries(outcomes)) {
    const nk = normOutcome(k);
    normOutcomes[nk] = (normOutcomes[nk] || 0) + v;
  }

  const dealCount = normOutcomes['deal_made'] || 0;

  document.getElementById('app').innerHTML = `
    <div class="container">
      <header>
        <div class="logo-area">
          <div class="logo-tag">Chennai Logistics // Carrier Ops</div>
          <h1>INBOUND SALES DASHBOARD</h1>
        </div>
        <div class="header-right">
          <div class="live-badge"><div class="live-dot"></div> LIVE</div>
          <div class="last-updated" id="last-updated">Updated just now</div>
        </div>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Calls</div>
          <div class="stat-value">${total}</div>
          <div class="stat-sub">all time</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Conversion Rate</div>
          <div class="stat-value">${convRate}<span>%</span></div>
          <div class="stat-sub">${dealCount} deals closed</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-label">Avg Agreed Rate</div>
          <div class="stat-value">$${avgRate.toLocaleString()}</div>
          <div class="stat-sub">per load</div>
        </div>
        <div class="stat-card red">
          <div class="stat-label">No Deal Rate</div>
          <div class="stat-value">${total > 0 ? (100 - convRate).toFixed(1) : 0}<span>%</span></div>
          <div class="stat-sub">${total - dealCount} missed</div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <div class="card-header">
            <div class="card-title">Call Outcomes</div>
            <div class="card-badge">${total} total</div>
          </div>
          <div class="chart-container">
            <canvas id="outcomeChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="card-header">
            <div class="card-title">Carrier Sentiment</div>
          </div>
          <div class="chart-container">
            <canvas id="sentimentChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="card-header">
            <div class="card-title">Rate Distribution</div>
          </div>
          <div class="chart-container">
            <canvas id="rateChart"></canvas>
          </div>
        </div>
      </div>

      <div class="table-card">
        <div class="card-header">
          <div class="card-title">Recent Calls</div>
          <div class="card-badge">last 10</div>
        </div>
        ${calls.length === 0 ? '<div class="empty">NO CALLS YET</div>' : `
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Carrier</th>
              <th>Lane</th>
              <th>Equipment</th>
              <th>Rate</th>
              <th>Outcome</th>
              <th>Sentiment</th>
            </tr>
          </thead>
          <tbody>
            ${calls.map(c => `
              <tr>
                <td>${formatDate(c.timestamp)} ${formatTime(c.timestamp)}</td>
                <td class="carrier">${c.carrier_name || '—'}</td>
                <td>${c.origin && c.destination ? `${c.origin} → ${c.destination}` : '—'}</td>
                <td>${c.equipment_type || '—'}</td>
                <td class="rate">${c.agreed_rate ? '$' + Number(c.agreed_rate).toLocaleString() : '—'}</td>
                <td><span class="badge ${normOutcome(c.call_outcome)}">${outcomeLabel(c.call_outcome)}</span></td>
                <td><span class="badge ${c.sentiment || 'unknown'}">${c.sentiment || 'unknown'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>`}
      </div>

      <footer>
        <div class="footer-text">CHENNAI LOGISTICS OPERATIONS CENTER // POWERED BY HAPPYROBOT</div>
        <div class="footer-text">AUTO-REFRESH 30s // <a href="${API_BASE}/docs" target="_blank">API DOCS</a></div>
      </footer>
    </div>
  `;

  // Outcome chart
  const outcomeLabels = Object.keys(normOutcomes).map(outcomeLabel);
  const outcomeValues = Object.values(normOutcomes);
  const outcomeColors = Object.keys(normOutcomes).map(k => {
    if (k === 'deal_made') return '#4caf79';
    if (k === 'no_deal') return '#e05454';
    if (k === 'carrier_ineligible') return '#666';
    if (k === 'carrier_declined') return '#c0392b';
    return '#555';
  });

  if (outcomeChart) outcomeChart.destroy();
  outcomeChart = new Chart(document.getElementById('outcomeChart'), {
    type: 'doughnut',
    data: {
      labels: outcomeLabels,
      datasets: [{ data: outcomeValues, backgroundColor: outcomeColors, borderWidth: 0, hoverOffset: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#666', font: { family: 'IBM Plex Mono', size: 10 }, padding: 16, boxWidth: 10 } }
      },
      cutout: '65%'
    }
  });

  // Sentiment chart
  const sentLabels = Object.keys(sentiments);
  const sentValues = Object.values(sentiments);
  const sentColors = sentLabels.map(k => {
    if (k === 'positive') return '#4caf79';
    if (k === 'neutral') return '#4a9eff';
    if (k === 'negative') return '#e05454';
    return '#555';
  });

  if (sentimentChart) sentimentChart.destroy();
  sentimentChart = new Chart(document.getElementById('sentimentChart'), {
    type: 'bar',
    data: {
      labels: sentLabels,
      datasets: [{ data: sentValues, backgroundColor: sentColors, borderWidth: 0, borderRadius: 2 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#666', font: { family: 'IBM Plex Mono', size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#666', font: { family: 'IBM Plex Mono', size: 10 }, stepSize: 1 } }
      }
    }
  });

  // Rate chart
  const rateData = calls.filter(c => c.agreed_rate && Number(c.agreed_rate) > 0).map(c => ({
    x: formatDate(c.timestamp) + ' ' + formatTime(c.timestamp),
    y: Number(c.agreed_rate)
  })).reverse();

  if (rateChart) rateChart.destroy();
  rateChart = new Chart(document.getElementById('rateChart'), {
    type: 'line',
    data: {
      labels: rateData.map(d => d.x),
      datasets: [{
        data: rateData.map(d => d.y),
        borderColor: '#f5a623',
        backgroundColor: 'rgba(245,166,35,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#f5a623',
        pointRadius: 4,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#666', font: { family: 'IBM Plex Mono', size: 9 }, maxTicksLimit: 5 } },
        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#666', font: { family: 'IBM Plex Mono', size: 10 }, callback: v => '$' + v.toLocaleString() } }
      }
    }
  });
}

async function refresh() {
  try {
    const data = await fetchStats();
    render(data);
    const el = document.getElementById('last-updated');
    if (el) el.textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
